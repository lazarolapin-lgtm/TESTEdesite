<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapin Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Hina+Mincho&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:
linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.82)),
url('https://i.postimg.cc/xC3Zh21H/lapin-designaer.jpg');
background-size:cover;
background-position:center center;
background-repeat:no-repeat;
background-attachment:fixed;
font-family:'Indie Flower',cursive;
overflow-x:hidden;
color:white;
}

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
z-index:9999;
padding:18px;
display:flex;
justify-content:center;
gap:35px;
border-bottom:1px solid #222;
}

nav a{
color:white;
text-decoration:none;
font-size:22px;
transition:0.4s;
}

nav a:hover{
color:#1E93FA;
transform:scale(1.1);
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:140px 20px 60px;
text-align:center;
}

.logo-img{
width:250px;
height:250px;
object-fit:contain;
transition:0.5s;
filter:drop-shadow(0 0 20px rgba(30,147,250,0.5));
}

.logo{
font-size:80px;
font-family:'Hina Mincho',serif;
letter-spacing:8px;
margin-bottom:20px;
}

.subtitle{
max-width:900px;
font-size:22px;
line-height:1.8;
opacity:0.9;
}

.botoes{
margin-top:50px;
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:15px 40px;
background:#1E93FA;
border-radius:50px;
text-decoration:none;
font-size:24px;
color:white;
transition:0.4s;
box-shadow:0 0 18px rgba(30,147,250,0.5);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:40px;
}

.gif-container{
position:relative;
overflow:hidden;
border-radius:20px;
background:#111;
box-shadow:0 4px 16px rgba(0,0,0,0.5);
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
}

.titulo{
font-size:60px;
text-align:center;
margin-top:80px;
}

#chat-toggle{
position:fixed;
bottom:24px;
right:24px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:#1E93FA;
color:white;
font-size:24px;
cursor:pointer;
z-index:9999;
}
</style>
</head>

<body>

<nav>
<a href="#home">home</a>
<a href="#logos">logotipo</a>
<a href="#mockups">mockups</a>
<a href="#contatos">contatos</a>
</nav>

<section class="hero" id="home">

<img src="https://i.postimg.cc/RFWkNQb8/png-1.png" class="logo-img">

<h1 class="logo">Lapin Designer</h1>

<p class="subtitle">
Estúdio criativo especializado em logotipos, mockups, banners e design profissional.
</p>

<div class="botoes">
<a href="#logos" class="btn">Galeria</a>
<a href="#mockups" class="btn">Portfolio</a>
</div>

</section>

<section id="logos">
<h2 class="titulo">Logotipos</h2>

<div class="gallery">
<div class="gif-container">
<img src="https://placehold.co/800x800/111111/FFFFFF?text=LOGOTIPO">
</div>

<div class="gif-container">
<img src="https://placehold.co/800x800/1E93FA/FFFFFF?text=LOGOTIPO">
</div>

<div class="gif-container">
<img src="https://placehold.co/800x800/333333/FFFFFF?text=LOGOTIPO">
</div>
</div>

</section>

<section id="mockups">
<h2 class="titulo">Mockups</h2>

<div class="gallery">
<div class="gif-container">
<img src="https://placehold.co/800x800/111111/FFFFFF?text=MOCKUP">
</div>

<div class="gif-container">
<img src="https://placehold.co/800x800/1E93FA/FFFFFF?text=MOCKUP">
</div>

<div class="gif-container">
<img src="https://placehold.co/800x800/333333/FFFFFF?text=MOCKUP">
</div>
</div>

</section>

<section id="contatos">
<h2 class="titulo">Contatos</h2>

<div style="text-align:center;padding:40px;font-size:24px;">
<p>Email: lazarolapin@gmail.com</p>
<p>WhatsApp: (11) 97077-3204</p>
</div>

</section>

<button id="chat-toggle">💬</button>

</body>
</html>
